<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Election Dashboard</title>

<style>
body {
    margin: 0;
    background: linear-gradient(90deg,#0b1c2c,#081420);
    font-family: Arial, sans-serif;
    color: white;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    padding: 20px 30px;
}

/* LAYOUT */
.container {
    display: flex;
    padding: 20px;
}

/* LEFT */
.left {
    width: 45%;
}

/* PARTY */
.party {
    display: flex;
    align-items: center;
    border-radius: 16px;
    padding: 12px;
    margin-bottom: 15px;
}

.party img {
    width: 75px;
    height: 75px;
    border-radius: 12px;
    object-fit: cover;
    margin-right: 10px;
}

.info {
    flex: 1;
}

.name {
    font-size: 18px;
    font-weight: bold;
}

.percent {
    font-size: 28px;
    font-weight: bold;
}

.small {
    font-size: 12px;
    opacity: 0.7;
}

.seats {
    font-size: 36px;
    font-weight: bold;
}

/* INPUT FIXES */
.controls {
    display: flex;
    gap: 6px;
    margin-top: 4px;
}

.controls input[type="number"] {
    width: 60px;   /* FIX: klein */
}

.controls input[type="color"] {
    width: 40px;   /* FIX: klein */
    height: 30px;
    padding: 0;
    border: none;
}

.controls input[type="file"] {
    font-size: 10px;
    width: 120px; /* FIX: nicht mehr riesig */
}

/* RIGHT */
.right {
    width: 55%;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CANVAS */
.canvas-wrap {
    position: relative;
}

.total {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 34px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="header">
    <div contenteditable="true">2006</div>
    <div contenteditable="true">HUNGARY</div>
</div>

<div class="container">

<div class="left" id="parties"></div>

<div class="right">
    <div class="canvas-wrap">
        <canvas id="chart" width="700" height="400"></canvas>
        <div class="total" id="total">0</div>
    </div>
</div>

</div>

<script>

let parties = [
    {name:"MSZP", percent:43.21, seats:190, color:"#d8435c", img:""},
    {name:"FIDESZ", percent:42.03, seats:164, color:"#f57c00", img:""},
    {name:"SZDSZ", percent:6.5, seats:20, color:"#1976d2", img:""},
    {name:"MDF", percent:5.04, seats:11, color:"#4caf50", img:""}
];

function render(){
    const el = document.getElementById("parties");
    el.innerHTML="";

    parties.forEach((p,i)=>{
        let div=document.createElement("div");
        div.className="party";
        div.style.background=p.color;

        div.innerHTML=`
            <img src="${p.img || 'https://via.placeholder.com/80'}">

            <div class="info">
                <div class="name" contenteditable oninput="update(${i},'name',this.innerText)">${p.name}</div>
                <div class="percent" contenteditable oninput="update(${i},'percent',this.innerText)">${p.percent}%</div>
                <div class="small">votes</div>

                <div class="controls">
                    <input type="number" value="${p.seats}" onchange="update(${i},'seats',this.value)">
                    <input type="color" value="${p.color}" onchange="update(${i},'color',this.value)">
                    <input type="file" onchange="upload(event,${i})">
                </div>
            </div>

            <div class="seats">${p.seats}</div>
        `;

        el.appendChild(div);
    });

    draw();
}

function update(i,key,val){
    if(key==="seats") val=Number(val);
    if(key==="percent") val=parseFloat(val);
    parties[i][key]=val;
    render();
}

function upload(e,i){
    let r=new FileReader();
    r.onload=(ev)=>{
        parties[i].img=ev.target.result;
        render();
    };
    r.readAsDataURL(e.target.files[0]);
}

/* 🔥 NEUER HALBKREIS (SCHARF, WIE BILD 2) */
function draw(){
    let canvas=document.getElementById("chart");
    let ctx=canvas.getContext("2d");

    ctx.clearRect(0,0,700,400);

    let total=parties.reduce((a,b)=>a+b.seats,0);
    document.getElementById("total").innerText=total;

    let start=Math.PI;
    let centerX=350;
    let centerY=350;

    let outer=200;
    let inner=110;

    parties.forEach(p=>{
        if(p.seats<=0) return;

        let angle=(p.seats/total)*Math.PI;

        ctx.beginPath();

        ctx.arc(centerX,centerY,outer,start,start+angle,false);
        ctx.arc(centerX,centerY,inner,start+angle,start,true);

        ctx.closePath();
        ctx.fillStyle=p.color;
        ctx.fill();

        start+=angle;
    });
}

render();

</script>

</body>
</html>
